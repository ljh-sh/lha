name: release

# Publish stage: tag a v* (or trigger manually) → GitHub Release with
# per-target tarball/zip + per-archive sha256 + top-level SHA256SUMS.
#
# Splits cleanly with `build-and-test.yml`:
#   - push / pull_request → build-and-test.yml (auto-test stage)
#   - tag push / dispatch → THIS workflow (publish stage)
#
# The build matrix below is intentionally identical to build-and-test.yml
# so a tag push produces a release in one shot, without depending on a
# separate workflow_run pull. The trade-off is that a tag push runs the
# matrix twice (here + in build-and-test.yml) ≈ +2 min — accepted for
# the simpler workflow_run-free model.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- main release matrix (tag + dispatch only) ----
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-linux-musl,  runner: ubuntu-latest,    os: linux,   libc: musl, docker_arch: amd64 }
          - { target: aarch64-linux-musl, runner: ubuntu-24.04-arm, os: linux,   libc: musl, docker_arch: arm64 }
          - { target: aarch64-macos,      runner: macos-14,         os: macos                  }
          - { target: x86_64-macos,       runner: macos-14,         os: macos                  }
          - { target: x86_64-windows,     runner: windows-latest,   os: windows                }
          # aarch64-windows deferred — same MSYS2 package-name gap as in
          # build-and-test.yml (see top-of-matrix comment there).
    continue-on-error: ${{ matrix.target == 'aarch64-linux-musl' || matrix.target == 'aarch64-macos' || matrix.target == 'x86_64-windows' }}
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      # ---- install deps ----
      - name: Install deps (Linux gnu — only used by actions that shell out)
        if: matrix.libc == 'musl'
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool

      - name: Install deps (macOS)
        if: matrix.os == 'macos'
        run: |
          brew update
          brew install autoconf automake libtool

      # msystem:MINGW64 on the runner gives the host-native toolchain.
      # For x86_64-windows on windows-latest that's mingw-w64-x86_64-gcc.
      # (aarch64-windows deferred: MSYS2 MINGW64 doesn't ship
      # mingw-w64-aarch64-gcc — see top-of-file matrix comment.)
      - name: Install deps (Windows MSYS2 + mingw64)
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git autoconf automake libtool
            make base-devel
            mingw-w64-x86_64-gcc mingw-w64-x86_64-libiconv

      # ---- build ----
      - name: Build + smoke on Alpine (musl)
        if: matrix.libc == 'musl'
        run: docker run --rm --platform linux/${{ matrix.docker_arch }} -v "$PWD":/w -w /w alpine:3.20 sh -c 'apk add --no-cache bash >/dev/null && bash /w/scripts/build-alpine.sh && bash /w/scripts/smoke.sh'

      - name: Build (macOS — host)
        if: matrix.os == 'macos' && matrix.target == 'aarch64-macos'
        run: bash scripts/build.sh

      # Intel macOS: cross-compile from Apple Silicon macos-14 via clang
      # -arch x86_64 (the Apple SDK is universal; no extra sysroot needed).
      - name: Build (macOS x86_64 — cross-compile)
        if: matrix.target == 'x86_64-macos'
        env:
          LHA_TARGET_ARCH: x86_64
          LHA_TARGET_OS: apple-darwin
          LHA_OS_HINT: darwin
        run: bash scripts/build.sh

      - name: Build (Windows x86_64 — msys2 bash)
        if: matrix.os == 'windows' && matrix.target == 'x86_64-windows'
        shell: msys2 {0}
        env:
          # MinGW's <unistd.h> does not declare `symlink()` (no _WIN32_WINNT
          # level reliably helps), but upstream's lhext.c calls it
          # unconditionally. Stub it via scripts/no-symlink.h which #defines
          # `symlink(real,name)` as `0 - 1` (= -1). The file is force-
          # included before any TU, so the call sites compile and the
          # upstream error fall-through (make_parent_path + retry + unlink)
          # runs at runtime — same path lha-test14 already assumes for
          # MinGW. The macro definition must live in a header (rather than
          # in `-Dsymlink(...)` on the command line) because /bin/sh, the
          # make recipe interpreter, parses `(real,name)` as a subshell and
          # rejects the rule before gcc ever sees it.
          CPPFLAGS: '-include ${{ github.workspace }}/scripts/no-symlink.h'
        run: bash scripts/build.sh

      # ---- smoke (host-side; musl smoke already ran in alpine docker) ----
      - name: Smoke test on host (gnu / macos)
        if: matrix.os != 'windows' && matrix.libc != 'musl'
        run: bash scripts/smoke.sh

      - name: Smoke test on Windows (informational)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        continue-on-error: true
        run: |
          set +e
          LHA="${{ github.workspace }}/build/src/lha.exe"
          echo "==> Windows smoke is currently informational only."
          echo "    Lha config hardcodes /tmp/lhXXXXXX which MSYS2 doesn't always expose."
          ls -la "$LHA" || { echo "FAIL: binary missing"; exit 1; }
          "$LHA" --version 2>&1 | head -3 || "$LHA" 2>&1 | head -3 || true
          echo "OK: binary executes; round-trip smoke deferred to a future release."

      # ---- package ----
      - name: Package (Linux / macOS)
        if: matrix.os != 'windows'
        run: TARGET=${{ matrix.target }} bash scripts/package.sh

      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        env:
          TARGET: ${{ matrix.target }}
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/package.ps1

      # ---- verify self-containedness ----
      - name: Verify self-contained (macOS only)
        if: matrix.os == 'macos'
        run: |
          set -e
          bin="dist/lha-${{ matrix.target }}/bin/lha"
          otool -L "$bin"
          otool -L "$bin" | grep -E '/(opt/homebrew|usr/local)/' \
            && { echo "FAIL: $bin links Homebrew dylibs"; exit 1; } || true
          echo "OK: only system libs (/usr/lib, /System/Library)"

      - name: Show file type & size
        if: matrix.os != 'windows'
        run: |
          file dist/lha-${{ matrix.target }}/bin/lha
          du -h dist/lha-${{ matrix.target }}.tar.xz
          # verify §2.a-bundle shape: src/ + LICENSE + TAKEDOWN must be in the archive
          tar tJf dist/lha-${{ matrix.target }}.tar.xz \
            | grep -E '^[^/]+/(bin/lha|src/lha|man/man1/lha\.1|LICENSE|TAKEDOWN\.md|README\.md)(/|$)' \
            | sort -u

      - name: Show file type & size (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          file dist/lha-${{ matrix.target }}/bin/lha.exe
          Get-ChildItem dist/lha-${{ matrix.target }}.zip | Format-Table Name, Length
          # verify §2.a-bundle shape: src\ + LICENSE + TAKEDOWN must be in the zip
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = "dist/lha-${{ matrix.target }}.zip"
          [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $zip)).Entries.FullName `
            | Where-Object { $_ -match '^(bin\\lha\.exe|src\\lha\\|man\\man1\\lha\.1|LICENSE|TAKEDOWN\.md|README\.md)(\\|$)' } `
            | Sort-Object -Unique

      # ---- upload artifact ----
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lha-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  # ---- publish on tag ----
  release:
    if: startsWith(github.ref, 'refs/tags/v') && needs.build.result == 'success'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          cd dist
          find . -type f \( -name '*.tar.xz' -o -name '*.zip' \) -print0 \
            | xargs -0 sha256sum | sed 's|^\([^ ]*\)  \./|\1  |' > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.xz
            dist/*.zip
            dist/*.sha256
            dist/SHA256SUMS
          generate_release_notes: true
